services:
  blog:
    build: .
    container_name: blog
    mem_limit: 512m
    cpus: 1.0
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    env_file:
      - .env
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - ./content:/app/content:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
